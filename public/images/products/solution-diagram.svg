<svg viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Drop shadow for the layers to give a realistic 3D hovering effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="15" flood-color="#2c3d2e" flood-opacity="0.12"/>
    </filter>
    
    <!-- Premium gradients for each layer -->
    <linearGradient id="grad-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f2f2"/>
    </linearGradient>

    <linearGradient id="grad-core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#eae6dd"/>
    </linearGradient>

    <linearGradient id="grad-barrier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7f0"/>
      <stop offset="100%" stop-color="#d6ebd6"/>
    </linearGradient>
    
    <linearGradient id="grad-glue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6e6e6"/>
    </linearGradient>

    <linearGradient id="grad-ph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#60c09d"/>
    </linearGradient>
  </defs>

  <!-- pH Strip Label -->
  <text x="660" y="100" fontSize="16" fontWeight="bold" fill="#2c3d2e" fontFamily="sans-serif">pH Strip</text>
  <path d="M 670 110 Q 640 160 550 170" stroke="#2c3d2e" strokeWidth="2" fill="none" />
  <path d="M 550 170 L 565 160 M 550 170 L 560 180" stroke="#2c3d2e" strokeWidth="2" fill="none" strokeLinecap="round" />

  <!-- Left Labels & Lines -->
  <!-- Layer 2: Absorbent Core -->
  <text x="320" y="270" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif" textAnchor="end">HemoSan® &amp; kenaf fibre</text>
  <text x="320" y="290" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif" textAnchor="end">absorbent core</text>
  <path d="M 340 275 L 400 275" stroke="#2c3d2e" strokeWidth="1" opacity="0.6" />

  <!-- Layer 4: Leakage Barrier -->
  <text x="320" y="470" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif" textAnchor="end">Novel Compostable plant based</text>
  <text x="320" y="490" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif" textAnchor="end">leakage barrier</text>
  <path d="M 340 475 L 420 475" stroke="#2c3d2e" strokeWidth="1" opacity="0.6" />

  <!-- Right Labels & Lines -->
  <!-- Layer 1: Top Sheet -->
  <text x="690" y="210" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">Novel Biodegradable</text>
  <text x="690" y="230" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">top-sheet</text>
  <path d="M 560 215 L 670 215" stroke="#2c3d2e" strokeWidth="1" opacity="0.6" />

  <!-- Layer 3: Anti-bacterial Layer -->
  <text x="690" y="370" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">Cotton anti-bacterial</text>
  <text x="690" y="390" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">layer</text>
  <path d="M 600 375 L 670 375" stroke="#2c3d2e" strokeWidth="1" opacity="0.6" />

  <!-- Layer 5: Glue -->
  <text x="690" y="570" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">Organic non-toxic</text>
  <text x="690" y="590" fontSize="15" fontWeight="600" fill="#2c3d2e" fontFamily="sans-serif">plant based glue</text>
  <path d="M 560 575 L 670 575" stroke="#2c3d2e" strokeWidth="1" opacity="0.6" />

  <!-- ================= LAYERS ================= -->
  <!-- Using an hourglass bezier shape to perfectly simulate a sanitary pad, scaled progressively -->

  <!-- Layer 5 - Glue -->
  <g transform="translate(500, 580)" filter="url(#shadow)">
    <path d="M -110 -50 C -55 -50 -35 -25 0 -25 C 35 -25 55 -50 110 -50 C 165 -50 195 -12 195 0 C 195 12 165 50 110 50 C 55 50 35 25 0 25 C -35 25 -55 50 -110 50 C -165 50 -195 12 -195 0 C -195 -12 -165 -50 -110 -50 Z" fill="url(#grad-glue)" stroke="#dcdcdc" strokeWidth="1.5" />
  </g>

  <!-- Layer 4 - Green Leak Barrier -->
  <g transform="translate(500, 480)" filter="url(#shadow)">
    <path d="M -105 -45 C -50 -45 -30 -22 0 -22 C 30 -22 50 -45 105 -45 C 155 -45 185 -10 185 0 C 185 10 155 45 105 45 C 50 45 30 22 0 22 C -30 22 -50 45 -105 45 C -155 45 -185 10 -185 0 C -185 -10 -155 -45 -105 -45 Z" fill="url(#grad-barrier)" stroke="#cce6cc" strokeWidth="1.5" />
  </g>

  <!-- Layer 3 - Anti-bacterial -->
  <g transform="translate(500, 380)" filter="url(#shadow)">
    <path d="M -100 -40 C -45 -40 -25 -20 0 -20 C 25 -20 45 -40 100 -40 C 145 -40 175 -8 175 0 C 175 8 145 40 100 40 C 45 40 25 20 0 20 C -25 20 -45 40 -100 40 C -145 40 -175 8 -175 0 C -175 -8 -145 -40 -100 -40 Z" fill="#ffffff" stroke="#e6e6e6" strokeWidth="1.5" />
  </g>

  <!-- Layer 2 - Absorbent Core (Fluffy effect using dashes) -->
  <g transform="translate(500, 280)" filter="url(#shadow)">
    <path d="M -95 -35 C -40 -35 -20 -18 0 -18 C 20 -18 40 -35 95 -35 C 135 -35 165 -6 165 0 C 165 6 135 35 95 35 C 40 35 20 18 0 18 C -20 18 -40 35 -95 35 C -135 35 -165 6 -165 0 C -165 -6 -135 -35 -95 -35 Z" fill="url(#grad-core)" stroke="#ebe2cf" strokeWidth="1.5" />
    <!-- Fluff texture -->
    <path d="M -80 0 Q 0 -15 80 0 M -50 10 Q 0 -5 50 10 M -70 -10 Q 0 5 70 -10 M -30 5 Q 0 -10 30 5" stroke="#f2ecde" strokeWidth="2" fill="none" opacity="0.9" strokeLinecap="round" strokeDasharray="8 6" />
  </g>

  <!-- Layer 1 - Top Sheet -->
  <g transform="translate(500, 180)" filter="url(#shadow)">
    <path d="M -90 -30 C -35 -30 -15 -15 0 -15 C 15 -15 35 -30 90 -30 C 125 -30 155 -5 155 0 C 155 5 125 30 90 30 C 35 30 15 15 0 15 C -15 15 -35 30 -90 30 C -125 30 -155 5 -155 0 C -155 -5 -125 -30 -90 -30 Z" fill="url(#grad-top)" stroke="#e0e0e0" strokeWidth="1.5" />
    <path d="M -70 -18 C -25 -18 -10 -8 0 -8 C 10 -8 25 -18 70 -18 C 100 -18 125 -3 125 0 C 125 3 100 18 70 18 C 25 18 10 8 0 8 C -10 8 -25 18 -70 18 C -100 18 -125 3 -125 0 C -125 -3 -100 -18 -70 -18 Z" fill="none" stroke="#e8e8e8" strokeWidth="1.5" strokeDasharray="4 4" />
    
    <!-- pH Strip -->
    <rect x="-30" y="-12" width="60" height="24" fill="url(#grad-ph)" rx="3" transform="rotate(-15)" />
    <!-- Strip details -->
    <line x1="-20" y1="-5" x2="20" y2="-5" stroke="#7eb8a2" strokeWidth="1.5" strokeDasharray="3 3" transform="rotate(-15)" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#7eb8a2" strokeWidth="1.5" strokeDasharray="3 3" transform="rotate(-15)" />
    <line x1="-20" y1="5" x2="20" y2="5" stroke="#7eb8a2" strokeWidth="1.5" strokeDasharray="3 3" transform="rotate(-15)" />
  </g>
</svg>
